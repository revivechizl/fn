<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>REVIVECHIZL — Official Artist Website</title>
  <meta name="description" content="REVIVECHIZL official artist website" />

  <!-- Open Graph / Instagram / WhatsApp -->
  <meta property="og:title" content="REVIVECHIZL Official Artist Website">
  <meta property="og:description" content="REVIVECHIZL official artist website">
  <meta property="og:image" content="https://www.revivechizl.co.uk/preview.png?v=5">
  <meta property="og:image:secure_url" content="https://www.revivechizl.co.uk/preview.png?v=5">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://www.revivechizl.co.uk/">
  <meta property="og:type" content="website">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="REVIVECHIZL — Official Artist Website">
  <meta name="twitter:description" content="REVIVECHIZL official artist website">
  <meta name="twitter:image" content="https://www.revivechizl.co.uk/preview.png?v=5">

  <!-- Favicon - PNG only -->
  <link rel="icon" type="image/png" href="https://www.revivechizl.co.uk/favicon.png?v=5">
  <link rel="shortcut icon" type="image/png" href="https://www.revivechizl.co.uk/favicon.png?v=5">
  <link rel="apple-touch-icon" href="https://www.revivechizl.co.uk/favicon.png?v=5">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="custom.css" />
</head>

<body>

  <!-- INTRO -->
  <section id="intro" class="intro-screen prompt-gated">
    <div class="grunge-layer"></div>

    <button class="enter-wrap" id="enterSite" aria-label="Enter REVIVECHIZL website">
      <span class="intro-r">R</span>
      <span class="enter-text">ENTER</span>
      <span class="enter-line"></span>
    </button>

    <footer class="intro-footer">
      <span>© 2026 REVIVECHIZL™</span>
      <span>ALL RIGHTS RESERVED.</span>
    </footer>
  </section>

  <!-- MAIN SITE -->
  <main id="site" class="site-shell is-hidden">

    <div class="top-logo logo-r" aria-label="REVIVECHIZL logo">R</div>

    <!-- HERO -->
    <section class="hero section-pad">
      <div class="hero-copy">
        <h1>REVIVECHIZL<span>™</span></h1>
        <p class="next-up">NEXT UP: SAVE MY SOUL (PROJECT)</p>
      </div>

      <!-- VIDEO -->
      <section class="video-section" aria-labelledby="latestVideoTitle">
        <h2 id="latestVideoTitle" class="latest-video-heading">
          LATEST RELEASE: DEATHWISH
        </h2>

        <div class="video-frame" id="latestVideo">
          <a class="video-fallback"
             href="https://www.youtube.com/@ReviveChizl"
             target="_blank"
             rel="noopener">
            <span class="video-title">REVIVECHIZL™ — LATEST VIDEO</span>
            <span class="play-button">▶</span>
            <span class="watch-copy">WATCH ON YOUTUBE</span>
          </a>
        </div>
      </section>
    </section>

    <!-- LINKS -->
    <section class="links-section section-pad" aria-label="REVIVECHIZL links">
      <div class="icon-row">
        <a data-link="spotifyUrl" class="platform spotify" aria-label="Spotify"></a>
        <a data-link="appleUrl" class="platform apple" aria-label="Apple Music"></a>
        <a data-link="youtubeUrl" class="platform youtube" aria-label="YouTube"></a>
        <a data-link="soundcloudUrl" class="platform soundcloud" aria-label="SoundCloud"></a>
        <a data-link="instagramUrl" class="platform instagram" aria-label="Instagram"></a>
      </div>

      <a id="ticketsButton"
         class="ticket-btn"
         href="https://events.bookitbee.com/ukundergroundnetwork/ukundergroundnetwork-presents-private-members-club/"
         target="_blank"
         rel="noopener">
        GET TICKETS
      </a>
    </section>

    <!-- LISTEN -->
    <section class="listen section-pad">
      <h2>LISTEN</h2>

      <div class="listen-grid">
        <a data-link="spotifyUrl" class="listen-card">
          <span class="platform spotify"></span>
          <strong>SPOTIFY</strong>
        </a>

        <a data-link="appleUrl" class="listen-card">
          <span class="platform apple"></span>
          <strong>APPLE MUSIC</strong>
        </a>

        <a data-link="youtubeUrl" class="listen-card">
          <span class="platform youtube"></span>
          <strong>YOUTUBE</strong>
        </a>

        <a data-link="soundcloudUrl" class="listen-card">
          <span class="platform soundcloud"></span>
          <strong>SOUNDCLOUD</strong>
        </a>

        <a data-link="instagramUrl" class="listen-card">
          <span class="platform instagram"></span>
          <strong>INSTAGRAM</strong>
        </a>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="site-footer section-pad">
      <span>© 2026 REVIVECHIZL™</span>
      <span>ALL RIGHTS RESERVED.</span>
    </footer>

  </main>

  <!-- SCRIPT -->
  <script src="script.js" type="module"></script>

</body>
</html>
